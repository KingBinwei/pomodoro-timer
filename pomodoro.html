<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POMODORO · 番茄钟</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,500;9..40,700&family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,900&display=swap" rel="stylesheet">
<style>
  /* ─── Design System ─── */
  :root {
    --bg-deep: #0a0908;
    --bg-surface: #121110;
    --bg-card: #1a1816;
    --text-primary: #ece6dc;
    --text-secondary: #8a8378;
    --text-muted: #5a5548;
    --gold: #c9a84c;
    --gold-dim: rgba(201, 168, 76, 0.25);
    --gold-subtle: rgba(201, 168, 76, 0.07);
    --gold-glow: rgba(201, 168, 76, 0.15);
    --sage: #6d8f6d;
    --border: rgba(201, 168, 76, 0.1);
    --font-display: 'Fraunces', serif;
    --font-body: 'DM Sans', sans-serif;
    --radius: 20px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-body);
    font-weight: 300;
    background: var(--bg-deep);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: var(--text-primary);
    position: relative;
    overflow-x: hidden;
  }

  /* Atmospheric gradient orbs */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 50% at 15% 30%, rgba(201, 168, 76, 0.04) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 85% 70%, rgba(255, 255, 255, 0.02) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* Subtle noise texture */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
    pointer-events: none;
    z-index: 100;
  }

  .container {
    position: relative;
    z-index: 1;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 56px 48px 48px;
    width: 440px;
    box-shadow:
      0 30px 80px rgba(0, 0, 0, 0.7),
      inset 0 1px 0 rgba(255, 255, 255, 0.03);
    animation: containerIn 0.8s ease-out;
  }

  @keyframes containerIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ─── Brand ─── */
  .brand {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 40px;
  }
  .brand-mark {
    width: 6px; height: 6px;
    background: var(--gold);
    border-radius: 50%;
    opacity: 0.6;
  }
  .brand-text {
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  /* ─── Mode Label ─── */
  .mode-label-wrap {
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .mode-label {
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-secondary);
    transition: color 0.4s;
  }
  .mode-label.break-mode {
    color: var(--sage);
  }
  .mode-indicator {
    width: 20px; height: 2px;
    background: var(--gold);
    transition: background 0.4s;
  }
  .mode-indicator.break-mode {
    background: var(--sage);
  }

  /* ─── Timer ─── */
  .timer-wrap {
    position: relative;
    margin-bottom: 32px;
    padding: 12px 0;
  }
  .timer {
    font-family: var(--font-display);
    font-size: 100px;
    font-weight: 900;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    color: var(--text-primary);
    letter-spacing: -2px;
    transition: color 0.6s ease;
  }
  .timer.break-mode {
    color: var(--sage);
  }

  /* Decorative divider under timer */
  .timer-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 12px;
  }
  .timer-divider-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .timer-divider-diamond {
    width: 6px; height: 6px;
    background: var(--gold);
    transform: rotate(45deg);
    opacity: 0.5;
    flex-shrink: 0;
  }
  .timer-divider-line:last-child {
    flex: 3;
  }

  /* ─── Controls ─── */
  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 36px;
  }
  .controls button {
    flex: 1;
    padding: 14px 16px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    background: transparent;
    color: var(--text-secondary);
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .controls button:hover {
    border-color: var(--gold-dim);
    color: var(--text-primary);
    transform: translateY(-1px);
  }
  .controls button:active {
    transform: translateY(0);
    transition-duration: 0.1s;
  }
  .controls button::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--gold-subtle);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .controls button:hover::after {
    opacity: 1;
  }

  .controls .btn-start {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--bg-deep);
    font-weight: 700;
  }
  .controls .btn-start:hover {
    background: #dbb956;
    border-color: #dbb956;
    color: var(--bg-deep);
  }
  .controls .btn-start:hover::after { display: none; }
  .controls .btn-start.break-mode {
    background: var(--sage);
    border-color: var(--sage);
  }
  .controls .btn-start.break-mode:hover {
    background: #7da07d;
    border-color: #7da07d;
  }

  .controls button:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    transform: none !important;
  }
  .controls button:disabled::after { display: none; }

  /* ─── Stats ─── */
  .stats-divider {
    height: 1px;
    background: var(--border);
    margin-bottom: 24px;
  }
  .stats {
    display: flex;
    gap: 48px;
    margin-bottom: 28px;
  }
  .stat-item {
    flex: 1;
  }
  .stat-number {
    font-family: var(--font-display);
    font-size: 32px;
    font-weight: 700;
    color: var(--gold);
    line-height: 1.2;
  }
  .stat-number.break-accent {
    color: var(--sage);
  }
  .stat-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* ─── Settings ─── */
  .settings details {
    cursor: pointer;
  }
  .settings summary {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    cursor: pointer;
    transition: color 0.3s;
    list-style: none;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .settings summary::-webkit-details-marker { display: none; }
  .settings summary:hover { color: var(--text-secondary); }
  .settings summary::before {
    content: '◆';
    font-size: 7px;
    color: var(--gold);
    opacity: 0.4;
  }
  .settings summary::after {
    content: '▸';
    font-size: 10px;
    margin-left: auto;
    transition: transform 0.3s;
    opacity: 0.4;
  }
  .settings[open] summary::after {
    transform: rotate(90deg);
  }
  .settings-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-top: 18px;
    padding: 20px;
    background: rgba(0,0,0,0.2);
    border-radius: 12px;
    border: 1px solid var(--border);
  }
  .settings-grid label {
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: center;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .settings-grid input {
    width: 100%;
    padding: 8px 4px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg-deep);
    color: var(--text-primary);
    text-align: center;
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 500;
    transition: border-color 0.3s;
    outline: none;
  }
  .settings-grid input:focus {
    border-color: var(--gold-dim);
  }

  /* ─── Responsive ─── */
  @media (max-width: 500px) {
    .container { width: 100%; margin: 12px; padding: 36px 24px 32px; }
    .timer { font-size: 72px; }
    .brand { margin-bottom: 28px; }
    .controls { gap: 8px; }
    .controls button { padding: 12px 10px; font-size: 11px; }
    .stats { gap: 24px; }
    .settings-grid {
      grid-template-columns: repeat(2, 1fr);
      padding: 16px;
    }
    .timer-wrap { margin-bottom: 24px; }
  }

  /* ─── Entrance stagger ─── */
  .brand        { animation: fadeUp 0.6s 0.05s both; }
  .mode-label-wrap { animation: fadeUp 0.6s 0.12s both; }
  .timer-wrap   { animation: fadeUp 0.6s 0.2s both; }
  .controls     { animation: fadeUp 0.6s 0.28s both; }
  .stats-divider,
  .stats        { animation: fadeUp 0.6s 0.36s both; }
  .settings     { animation: fadeUp 0.6s 0.44s both; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Timer pulse when running */
  .timer.running {
    animation: timerPulse 2s ease-in-out infinite;
  }
  @keyframes timerPulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.85; }
  }
</style>
</head>
<body>
<div class="container">
  <!-- Brand -->
  <div class="brand">
    <span class="brand-mark"></span>
    <span class="brand-text">Pomodoro</span>
  </div>

  <!-- Mode -->
  <div class="mode-label-wrap">
    <span class="mode-indicator" id="modeIndicator"></span>
    <span class="mode-label" id="modeLabel">专注时间</span>
  </div>

  <!-- Timer -->
  <div class="timer-wrap">
    <div class="timer" id="timerDisplay">25:00</div>
    <div class="timer-divider">
      <span class="timer-divider-line"></span>
      <span class="timer-divider-diamond"></span>
      <span class="timer-divider-line"></span>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn-start" id="startBtn">开始</button>
    <button id="pauseBtn" disabled>暂停</button>
    <button id="resetBtn">重置</button>
  </div>

  <!-- Stats -->
  <div class="stats-divider"></div>
  <div class="stats">
    <div class="stat-item">
      <div class="stat-number" id="completedCount">0</div>
      <div class="stat-label">已完成</div>
    </div>
    <div class="stat-item">
      <div class="stat-number break-accent" id="sessionCount">0</div>
      <div class="stat-label">本轮番茄</div>
    </div>
  </div>

  <!-- Settings -->
  <div class="settings">
    <details>
      <summary>设置</summary>
      <div class="settings-grid">
        <label>专注 <input type="number" id="workDuration" value="25" min="1" max="120"></label>
        <label>短休 <input type="number" id="shortBreakDuration" value="5" min="1" max="30"></label>
        <label>长休 <input type="number" id="longBreakDuration" value="15" min="1" max="60"></label>
        <label>长休间隔 <input type="number" id="longBreakInterval" value="4" min="1" max="10"></label>
      </div>
    </details>
  </div>
</div>

<script>
  const DEFAULTS = { work: 25, shortBreak: 5, longBreak: 15, longBreakInterval: 4 };
  const STORAGE_KEY = 'pomodoro-settings';

  let state = {
    mode: 'work',
    seconds: 25 * 60,
    isRunning: false,
    timerId: null,
    completedPomodoros: 0,
    sessionPomodoros: 0,
  };

  function loadSettings() {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) return JSON.parse(saved);
    } catch {}
    return DEFAULTS;
  }

  function saveSettings(settings) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(settings)); } catch {}
  }

  const savedSettings = loadSettings();
  const $ = id => document.getElementById(id);
  const timerDisplay = $('timerDisplay');
  const modeLabel = $('modeLabel');
  const modeIndicator = $('modeIndicator');
  const startBtn = $('startBtn');
  const pauseBtn = $('pauseBtn');
  const resetBtn = $('resetBtn');
  const completedCount = $('completedCount');
  const sessionCount = $('sessionCount');
  const inputs = {
    work: $('workDuration'),
    shortBreak: $('shortBreakDuration'),
    longBreak: $('longBreakDuration'),
    longBreakInterval: $('longBreakInterval'),
  };

  inputs.work.value = savedSettings.work;
  inputs.shortBreak.value = savedSettings.shortBreak;
  inputs.longBreak.value = savedSettings.longBreak;
  inputs.longBreakInterval.value = savedSettings.longBreakInterval;

  function getDuration(mode) {
    const v = parseInt(inputs[mode].value, 10);
    return (v || DEFAULTS[mode]) * 60;
  }

  function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
  }

  function stopTimer() {
    if (state.timerId) {
      clearInterval(state.timerId);
      state.timerId = null;
    }
  }

  function setUiIdle(text = '开始') {
    state.isRunning = false;
    startBtn.textContent = text;
    startBtn.disabled = false;
    pauseBtn.disabled = true;
    timerDisplay.classList.remove('running');
  }

  function updateTimerText() {
    timerDisplay.textContent = formatTime(state.seconds);
  }

  function updateDisplay() {
    updateTimerText();
    const isWork = state.mode === 'work';
    timerDisplay.className = `timer${isWork ? '' : ' break-mode'}${state.isRunning ? ' running' : ''}`;
    modeLabel.className = `mode-label${isWork ? '' : ' break-mode'}`;
    modeIndicator.className = `mode-indicator${isWork ? '' : ' break-mode'}`;
    startBtn.className = `btn-start${isWork ? '' : ' break-mode'}`;
    const labels = { work: '专注时间', shortBreak: '短休息', longBreak: '长休息' };
    modeLabel.textContent = labels[state.mode];
  }

  function updateStats() {
    completedCount.textContent = state.completedPomodoros;
    sessionCount.textContent = state.sessionPomodoros;
  }

  function resetTimer() {
    stopTimer();
    setUiIdle();
    state.seconds = getDuration(state.mode) * 60;
    updateDisplay();
  }

  function switchMode(mode) {
    state.mode = mode;
    resetTimer();
  }

  function completeSession() {
    if (state.mode === 'work') {
      state.completedPomodoros++;
      state.sessionPomodoros++;
      updateStats();
      const interval = parseInt(inputs.longBreakInterval.value, 10) || DEFAULTS.longBreakInterval;
      if (state.sessionPomodoros >= interval) {
        state.sessionPomodoros = 0;
        switchMode('longBreak');
        tryNotify('番茄完成！开始长休息 🎉');
      } else {
        switchMode('shortBreak');
        tryNotify('番茄完成！休息一下 🎉');
      }
    } else {
      switchMode('work');
      tryNotify('休息结束，开始专注！');
    }
  }

  function tryNotify(msg) {
    if ('Notification' in window && Notification.permission === 'granted') {
      new Notification('🍅 番茄钟', { body: msg });
    } else if ('Notification' in window && Notification.permission !== 'denied') {
      Notification.requestPermission();
    }
  }

  function tick() {
    if (state.seconds <= 0) {
      stopTimer();
      setUiIdle();
      completeSession();
      return;
    }
    state.seconds--;
    updateTimerText();
  }

  function startTimer() {
    if (state.isRunning) return;
    state.isRunning = true;
    startBtn.textContent = '运行中';
    startBtn.disabled = true;
    pauseBtn.disabled = false;
    timerDisplay.classList.add('running');
    state.timerId = setInterval(tick, 1000);
  }

  function pauseTimer() {
    if (!state.isRunning) return;
    stopTimer();
    setUiIdle('继续');
  }

  function resetAll() {
    stopTimer();
    state.seconds = getDuration(state.mode) * 60;
    setUiIdle();
    updateTimerText();
  }

  function onSettingChange() {
    if (!state.isRunning) {
      state.seconds = getDuration(state.mode) * 60;
      updateTimerText();
    }
    const s = {
      work: parseInt(inputs.work.value, 10) || DEFAULTS.work,
      shortBreak: parseInt(inputs.shortBreak.value, 10) || DEFAULTS.shortBreak,
      longBreak: parseInt(inputs.longBreak.value, 10) || DEFAULTS.longBreak,
      longBreakInterval: parseInt(inputs.longBreakInterval.value, 10) || DEFAULTS.longBreakInterval,
    };
    saveSettings(s);
  }

  startBtn.addEventListener('click', startTimer);
  pauseBtn.addEventListener('click', pauseTimer);
  resetBtn.addEventListener('click', resetAll);
  Object.values(inputs).forEach(inp => inp.addEventListener('change', onSettingChange));

  state.seconds = getDuration('work') * 60;
  updateDisplay();
  updateStats();

  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.code === 'Space') { e.preventDefault(); state.isRunning ? pauseTimer() : startTimer(); }
    if (e.code === 'KeyR') { e.preventDefault(); resetAll(); }
  });
</script>
</body>
</html>
